suite: test prometheus RBAC templates
templates:
  - rbac/prometheus-pod.yaml
  - rbac/prometheus-binding.yaml
tests:
  - it: should not render prometheus RBAC when disabled by default
    asserts:
      - hasDocuments:
          count: 0
        template: rbac/prometheus-pod.yaml
      - hasDocuments:
          count: 0
        template: rbac/prometheus-binding.yaml

  - it: should not render prometheus RBAC when explicitly disabled
    set:
      prometheus.enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: rbac/prometheus-pod.yaml
      - hasDocuments:
          count: 0
        template: rbac/prometheus-binding.yaml

  - it: should render prometheus RBAC when enabled
    set:
      prometheus.enabled: true
    asserts:
      - hasDocuments:
          count: 1
        template: rbac/prometheus-pod.yaml
      - hasDocuments:
          count: 1
        template: rbac/prometheus-binding.yaml
      - equal:
          path: metadata.name
          value: kai-prometheus
        template: rbac/prometheus-pod.yaml
      - equal:
          path: metadata.name
          value: kai-prometheus
        template: rbac/prometheus-binding.yaml

  - it: should bind prometheus ServiceAccount in the release namespace
    set:
      prometheus.enabled: true
    release:
      namespace: custom-ns
    asserts:
      - equal:
          path: subjects[0].namespace
          value: custom-ns
        template: rbac/prometheus-binding.yaml
      - notEqual:
          path: subjects[0].namespace
          value: kai-scheduler
        template: rbac/prometheus-binding.yaml
